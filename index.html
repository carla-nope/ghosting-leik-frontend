<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="author" content="GhostingLeik" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ghostingleik" />
    <meta name="twitter:creator" content="@ghostingleik" />
    <meta name="twitter:title" content="GhostingLeik - Japanese Ghost Stories & Yōkai Encyclopedia" />

    <meta name="twitter:image" content="https://ghostingleik.com/og-image.png" />

    <!-- Additional SEO -->
    <link rel="canonical" href="https://ghostingleik.com/" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GhostingLeik",
      "url": "https://ghostingleik.com",
      "logo": "https://ghostingleik.com/logo.png",
      "description": "Your destination for Japanese ghost stories, yōkai folklore, and supernatural tales.",
      "sameAs": [
        "https://twitter.com/ghostingleik",
        "https://facebook.com/ghostingleik",
        "https://instagram.com/ghostingleik",
        "https://discord.gg/ghostingleik"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@ghostingleik.com",
        "contactType": "Customer Support"
      }
    }
    </script>

    <!-- Structured Data - WebSite with Search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GhostingLeik",
      "url": "https://ghostingleik.com",
      "description": "Japanese ghost stories, yōkai encyclopedia, and supernatural folklore",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ghostingleik.com/stories?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
